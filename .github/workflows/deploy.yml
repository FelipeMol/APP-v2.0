name: Build e Deploy → cPanel

on:
  push:
    branches: [main]
    paths:
      - 'app-v2/**'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-v2/package-lock.json

      # 3. Instalar dependências
      - name: Instalar dependências
        working-directory: app-v2
        run: npm ci

      # 4. Build (usa .env.production que está no repo)
      - name: Build
        working-directory: app-v2
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # 5. Copiar .htaccess para dist/ (necessário para o React Router funcionar)
      - name: Copiar .htaccess
        working-directory: app-v2
        run: |
          if [ -f .htaccess ]; then
            cp .htaccess dist/.htaccess
            echo ".htaccess copiado"
          fi

      # 6. Deploy via FTP para cPanel
      - name: Deploy FTP → cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: app-v2/dist/
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          protocol: ftps
          port: 21
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
